services:
  - type: web
    name: travel-quote-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
